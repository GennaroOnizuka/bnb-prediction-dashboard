<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#07110f">
    <title>Icarus Assets Management</title>
    <link rel="stylesheet" href="./styles.css?v=20260629-2">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <p class="eyebrow">Live Bot Dashboard</p>
          <h1>Icarus Assets Management</h1>
          <p id="updatedAt" class="subtle">Caricamento dati...</p>
        </div>
        <button id="refresh" class="button">Aggiorna</button>
      </header>

      <div id="error" class="error"></div>

      <section class="kpi-grid" aria-label="Metriche principali">
        <article class="kpi primary">
          <span>Net PnL</span>
          <strong id="netPnl">--</strong>
        </article>
        <article class="kpi">
          <span>Win rate</span>
          <strong id="winRate">--</strong>
        </article>
        <article class="kpi">
          <span>Trade chiusi</span>
          <strong id="closedTrades">--</strong>
        </article>
        <article class="kpi">
          <span>Open</span>
          <strong id="openBets">--</strong>
        </article>
      </section>

      <section id="walletGrid" class="wallet-grid" aria-label="Wallet monitorati"></section>

      <section class="panel">
        <div class="panel-head">
          <h2>PnL giornaliero</h2>
          <span id="volume" class="metric-note">--</span>
        </div>
        <div class="chart-box">
          <canvas id="pnlChart"></canvas>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Ultimi 10 trade</h2>
          <span id="lossStreak" class="metric-note">--</span>
        </div>
        <div id="tradeList" class="trade-list"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="./config.js?v=20260629-2"></script>
    <script src="./app.js?v=20260629-2"></script>
  </body>
</html>
